name: Build and Push Docker Image

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest litellm stable version
        id: litellm
        run: |
          VERSION=$(curl -s "https://hub.docker.com/v2/repositories/litellm/litellm/tags?page_size=50&ordering=last_updated" \
            | jq -r '.results[].name' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest litellm version: $VERSION"

      - name: Check if already published
        id: check
        run: |
          TAG="adaex/litellm-passthrough:${{ steps.litellm.outputs.version }}"
          if docker manifest inspect "$TAG" > /dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already published: $TAG"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "New version to publish: $TAG"
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.skip == 'false'

      - uses: docker/login-action@v3
        if: steps.check.outputs.skip == 'false'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.skip == 'false'
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: LITELLM_VERSION=${{ steps.litellm.outputs.version }}
          tags: |
            adaex/litellm-passthrough:${{ steps.litellm.outputs.version }}
            adaex/litellm-passthrough:latest
