name: Build and Push Docker Image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      litellm_version:
        description: "LiteLLM version tag (e.g. v1.85.0)"
        required: true
        default: "v1.85.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.litellm_version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: LITELLM_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            adaex/litellm-passthrough:${{ steps.version.outputs.tag }}
            adaex/litellm-passthrough:latest
