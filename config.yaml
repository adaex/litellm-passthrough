model_list:
  - model_name: "*"
    litellm_params:
      model: "*"
      custom_llm_provider: "custom_openai"
      api_base: "https://placeholder.invalid/v1"
      api_key: "placeholder"
      configurable_clientside_auth_params:
        - "api_base"
        - "api_key"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_spend_logs: true
  disable_error_logs: true
  allow_requests_on_db_unavailable: true

litellm_settings:
  drop_params: true
  modify_params: true
  request_timeout: 600
  num_retries: 0
  set_verbose: false
  json_logs: true
  callbacks: hooks.dynamic_upstream_hook
